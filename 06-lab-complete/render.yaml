services:
  - type: web
    name: ai-agent-production
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /ready
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "1.0.0"
      - key: REDIS_URL
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: LOG_LEVEL
        value: "INFO"
